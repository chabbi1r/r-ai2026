name: CI - OpenClaw Auto-Restart & Persistence

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Restore OpenClaw Data
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        mkdir -p ~/.openclaw
        git clone --branch data-storage https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git storage_temp || echo "Branch not found, will create one later."
        if [ -d "storage_temp/openclaw_data" ]; then
            cp -r storage_temp/openclaw_data/. ~/.openclaw/ || true
        fi

    - name: Optimize Windows (Free up RAM & CPU)
      shell: powershell
      run: |
        Set-MpPreference -DisableRealtimeMonitoring $true
        Stop-Service -Name wuauserv -Force -ErrorAction SilentlyContinue
        Set-Service -Name wuauserv -StartupType Disabled -ErrorAction SilentlyContinue
        Stop-Service -Name DiagTrack -Force -ErrorAction SilentlyContinue
        Set-Service -Name DiagTrack -StartupType Disabled -ErrorAction SilentlyContinue

    - name: Configure RDP & User
      shell: powershell
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        $password = ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force
        New-LocalUser -Name "runneradmin" -Password $password -FullName "Runner Admin" -ErrorAction SilentlyContinue | Out-Null
        Set-LocalUser -Name "runneradmin" -Password $password -ErrorAction SilentlyContinue | Out-Null

    - name: Download & Extract Bore
      shell: powershell
      run: |
        Invoke-WebRequest https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip -OutFile bore.zip
        Expand-Archive bore.zip -DestinationPath .

    - name: Install OpenClaw
      run: npm install -g openclaw@latest

    - name: Start Bore Tunnel (Background Loop)
      shell: powershell
      run: |
        $script = @"
        while (`$true) {
            .\bore.exe local 3389 --to bore.pub 2>&1 | Out-File -FilePath bore_log.txt -Encoding utf8 -Append
            Start-Sleep -Seconds 5
        }
        "@
        Set-Content -Path "run_bore.ps1" -Value $script
        Start-Process powershell -ArgumentList "-File run_bore.ps1" -WindowStyle Hidden

    - name: Keep-alive & Monitor Tunnel
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        echo "Waiting 15 seconds for Bore to connect..."
        sleep 15
        
        last_port=""
        end_time=$((SECONDS + 20700)) # 5 hours and 45 minutes
        
        echo "Server is running. Monitoring for connection changes..."
        
        # Loop to keep checking if the port changed
        while [ $SECONDS -lt $end_time ]; do
          current_port=$(grep "listening at" bore_log.txt | tail -n 1)
          if [ "$current_port" != "$last_port" ] && [ ! -z "$current_port" ]; then
            echo "=================================================="
            echo "🟢 RDP CONNECTION INFO (UPDATED):"
            echo "$current_port"
            echo "Username: runneradmin"
            echo "Password: P@ssw0rd!"
            echo "=================================================="
            last_port=$current_port
          fi
          sleep 10
        done
        
        echo "Saving OpenClaw Data to Cloud (GitHub Branch)..."
        mkdir -p sync_folder/openclaw_data
        cp -r ~/.openclaw/. sync_folder/openclaw_data/ || true
        cd sync_folder
        git init
        git remote add origin https://${GH_TOKEN}@github.com/${{ github.repository }}.git
        git checkout -b data-storage
        git add .
        git commit -m "Auto-save OpenClaw data - $(date)"
        git push origin data-storage --force
        
        echo "Triggering next RDP session..."
        gh workflow run "${{ github.workflow }}"
        
        echo "Closing current session in 5 minutes..."
        sleep 300
