name: CI - RDP Without Ngrok

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Enable TS
      run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
      
    - run: Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
      
    - run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
      
    - run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd!" -Force)
      
    - name: Setup Python
      run: python -m pip install --upgrade pip
      
    - name: Download Bore (Ngrok Alternative)
      run: Invoke-WebRequest https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip -OutFile bore.zip
      
    - name: Extract Bore
      run: Expand-Archive bore.zip -DestinationPath .
      
    - name: Create Tunnel (Check logs for Port)
      run: .\bore.exe local 3389 --to bore.pub
